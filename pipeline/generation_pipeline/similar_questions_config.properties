# Similar Questions Generator Configuration

# LLM Configuration
[llm_models]
anthropic_llm_model=claude-3-5-sonnet-latest
openai_llm_model=gpt-4-0125-preview
gemini_llm_model=gemini-1.5-flash
deepseek_llm_model=deepseek-reasoner
grok_llm_model=grok-3-latest
temperature=0.3

# Default LLM Provider
[defaults]
llm_provider=openai
num_questions=5

# Input Folder Configuration
[input_folders]
pdf_folder=data/pdf_questions
image_folder=data/image_questions
text_folder=data/text_questions
output_folder=generated_questions

# Processing Configuration
[processing]
max_pdf_pages=50
extraction_timeout=30
batch_size=10
process_all_folders=true

# Question Metadata Template
[question_metadata]
subject=AP Calculus BC
subject_area=Calculus
skill=Infinite Sequences and Series
requires_diagram=false
diagram_gen_steps=[]
learning_objectives=["Determine whether a geometric series converges or diverges."]

# Output Configuration
[output]
output_format=json
output_directory=generated_questions 