# MongoDB configuration
[mongodb]
mongo_adaptive_db_name=adaptive_learning_docs
mongo_questions_collection=questions
chroma_collection_name=questions_collection
mongo_db_name=prompt_project
mongo_collection_name=input_questions

# Prompt paths
[prompts]
extraction_system_prompt_path=prompts/extraction_system_prompt.txt
extraction_user_prompt_path=prompts/extraction_user_prompt.txt

generation_system_prompt_path=pipeline/prompts/generation_system_prompt_template_mc.txt
generation_user_prompt_path=pipeline/prompts/generation_usr_prompt_template_mc.txt

# LLM models
[llm_models]
llm_model=gemini
anthropic_llm_model=claude-3-5-sonnet-latest
openai_llm_model=gpt-4o-2024-08-06
gemini_llm_model=gemini-1.5-flash
deepseek_llm_model=deepseek-reasoner
grok_llm_model=grok-3-latest
temperature=1.0
embedding_model=text-embedding-3-small

# Task configuration
[task]
task_name=AP Calculus AB
# List of skill IDs
skill_ids=200,201
num_questions=5
prompt_type=Multiple Choice
output_mode=file
#sample_questions_file=/Users/sarmakompalli/prompt_rag_project/data/ap-calculus-ab-and-bc-sample_questions.json
pdf_path=data/questions.pdf
pdf_extraction_timeout=30
max_pdf_pages=1000

# Logging configuration
[logging]
log_level=INFO
log_format=%(asctime)s - %(name)s - %(levelname)s - %(message)s

# Cache settings
[cache]
use_cache=true
cache_dir=cache
cache_expiry=3600

# Retry settings
[retry]
max_retries=3
retry_delay=5
timeout=60

# Processing settings
[processing]
chunk_size=3000
batch_size=5
similarity_threshold=0.8
max_similar_questions=5 