# Database Configuration
[mongodb]
mongo_server=127.0.0.1
mongo_port=27017
mongo_db_name=adaptive_learning_docs
mongo_questions_collection=questions
#mongo_questions_collection=dryrun_questions
mongo_course_framework_collection=course_framework
#mongo_output_collection=dryrun_questions
mongo_output_collection=test_questions
#mongo_output_collection=AP_Physics_2_Collection
mongo_adaptive_db_name=adaptive_learning_docs

[mysql]
mysql_host=localhost
mysql_database=adaptive_learning

[chroma]
chroma_collection_name=questions_collection
chroma_persist_directory=chroma_db

# LLM Configuration
[llm_models]
anthropic_llm_model=claude-3-5-sonnet-latest
openai_llm_model=gpt-4-0125-preview
gemini_llm_model=gemini-1.5-flash
deepseek_llm_model=deepseek-reasoner
grok_llm_model=grok-3-latest
temperature=0.3
embedding_model=text-embedding-3-small

# Questons Generation Task Configuration
llm_model=grok
[task]
#task_name=AP Calculus AB
skill_ids=171,172,173,174,175,176,177,178
num_questions=15
prompt_type=Multiple Choice
workflow_type=generate
#output_mode=file
output_mode=mongo
#sample_questions_file=/Users/sarmakompalli/prompt_rag_project/data/ap-calculus-ab-and-bc-sample_questions.json
bloom_levels=Analyzing,Evaluating
# Bloom's Taxonomy Configuration
[bloom_level_mapping]
Remembering=1
Understanding=2
Applying=3
Analyzing=4
Evaluating=5

[bloom_prompts]
# Remembering Level
remembering_system_prompt_path=pipeline/prompts/SAT/generation_system_prompt_template_mc_remembering.txt
remembering_user_prompt_path=pipeline/prompts/SAT/generation_usr_prompt_template_mc_remembering.txt

# Understanding Level
understanding_system_prompt_path=pipeline/prompts/SAT/generation_system_prompt_template_mc_understanding.txt
understanding_user_prompt_path=pipeline/prompts/SAT/generation_usr_prompt_template_mc_understanding.txt

# Applying Level
applying_system_prompt_path=pipeline/prompts/SAT/generation_system_prompt_template_mc_applying.txt
applying_user_prompt_path=pipeline/prompts/SAT/generation_usr_prompt_template_mc_applying.txt

# Analyzing Level
analyzing_system_prompt_path=pipeline/prompts/generation_system_prompt_template_mc_analyzing.txt
analyzing_user_prompt_path=pipeline/prompts/generation_usr_prompt_template_mc_analyzing.txt

# Evaluating Level
evaluating_system_prompt_path=pipeline/prompts/generation_system_prompt_template_mc_evaluating.txt
evaluating_user_prompt_path=pipeline/prompts/generation_usr_prompt_template_mc_evaluating.txt

# Extraction Configuration
[extraction]
pdf_path=data/questions.pdf
pdf_extraction_timeout=30
max_pdf_pages=1000

# Prompt Configuration
[prompts]
extraction_system_prompt_path=prompts/extraction_system_prompt.txt
extraction_user_prompt_path=prompts/extraction_user_prompt.txt

# Logging Configuration
[logging]
log_level=INFO
log_format=%(asctime)s - %(name)s - %(levelname)s - %(message)s

# Cache Configuration
[cache]
use_cache=true
cache_dir=cache
cache_expiry=3600

# Retry Configuration
[retry]
max_retries=3
retry_delay=5
timeout=60

# Processing Configuration
[processing]
chunk_size=3000
batch_size=5
similarity_threshold=0.8
max_similar_questions=5 